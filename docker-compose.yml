services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lumiscan
      POSTGRES_PASSWORD: lumiscan
      POSTGRES_DB: lumiscan
    ports:
      - "5433:5432"
    volumes:
      - lumiscan_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumiscan -d lumiscan"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - lumiscan_minio:/data

volumes:
  lumiscan_pg:
  lumiscan_minio:
